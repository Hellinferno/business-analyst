name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        working-directory: ba-assistant/backend
        run: uv sync

      - name: Run linter
        working-directory: ba-assistant/backend
        run: uv run ruff check app/

      - name: Run type check
        working-directory: ba-assistant/backend
        run: uv run mypy app/

      - name: Run tests
        working-directory: ba-assistant/backend
        run: uv run pytest --tb=short -q

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: ba-assistant/frontend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: ba-assistant/frontend
        run: pnpm install --frozen-lockfile

      - name: Run linter
        working-directory: ba-assistant/frontend
        run: pnpm lint

      - name: Run type check
        working-directory: ba-assistant/frontend
        run: pnpm typecheck

      - name: Build
        working-directory: ba-assistant/frontend
        run: pnpm build

  deploy-backend:
    needs: test-backend
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy backend to Railway
        working-directory: ba-assistant/backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service ba-assistant-backend --detach

  deploy-frontend:
    needs: test-frontend
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: ba-assistant/frontend
